services:
  mcp-server:
    build: .
    container_name: devmate-mcp-server
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config.toml:/app/config.toml
      - ./test_dir:/app/test_dir
      - ./main.py:/app/main.py
      - ./docs:/app/docs
      - vector_db:/app/vector_db
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - MODEL_API_KEY=${MODEL_API_KEY:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
    command: ["uv", "run", "python", "-m", "devmate.mcp.server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  devmate-app:
    build: .
    container_name: devmate-app
    stdin_open: true
    tty: true
    volumes:
      - ./src:/app/src
      - ./config.toml:/app/config.toml
      - ./test_dir:/app/test_dir
      - ./main.py:/app/main.py
      - ./docs:/app/docs
      - vector_db:/app/vector_db
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - MODEL_API_KEY=${MODEL_API_KEY:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
    command: ["uv", "run", "python", "main.py"]
    depends_on:
      - mcp-server
    restart: "no"

volumes:
  vector_db:
